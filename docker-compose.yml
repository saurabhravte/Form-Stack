version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: formstack-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: formstack
      POSTGRES_PASSWORD: formstack
      POSTGRES_DB: formstack
    volumes:
      - formstack_pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: formstack-redis
    restart: always
    ports:
      - "6379:6379"
volumes:
  formstack_pg_data:
